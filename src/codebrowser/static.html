<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Browser</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme">
<style>
/* === THEME: Dark (default) === */
[data-theme="dark"] {
  --bg: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-link: #58a6ff;
  --hover: #1c2128;
  --line-num: #484f58;
  --line-hover: rgba(56,139,253,0.1);
  --header-bg: #161b22;
  --scrollbar-thumb: #30363d;
  --scrollbar-track: #0d1117;
  --code-bg: #161b22;
  --inline-code-bg: rgba(110,118,129,0.2);
  --icon-fill: #8b949e;
}

/* === THEME: Light === */
[data-theme="light"] {
  --bg: #ffffff;
  --bg-secondary: #f6f8fa;
  --bg-tertiary: #eef1f5;
  --border: #d1d9e0;
  --text: #1f2328;
  --text-secondary: #656d76;
  --text-link: #0969da;
  --hover: #f3f4f6;
  --line-num: #8c959f;
  --line-hover: rgba(9,105,218,0.06);
  --header-bg: #f6f8fa;
  --scrollbar-thumb: #c5ccd3;
  --scrollbar-track: #ffffff;
  --code-bg: #f6f8fa;
  --inline-code-bg: rgba(175,184,193,0.2);
  --icon-fill: #656d76;
}

/* === THEME: Solarized === */
[data-theme="solarized"] {
  --bg: #002b36;
  --bg-secondary: #073642;
  --bg-tertiary: #0a4050;
  --border: #2a5662;
  --text: #93a1a1;
  --text-secondary: #657b83;
  --text-link: #268bd2;
  --hover: #094050;
  --line-num: #586e75;
  --line-hover: rgba(38,139,210,0.1);
  --header-bg: #073642;
  --scrollbar-thumb: #2a5662;
  --scrollbar-track: #002b36;
  --code-bg: #073642;
  --inline-code-bg: rgba(101,123,131,0.2);
  --icon-fill: #657b83;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); line-height:1.5; transition:background .2s, color .2s; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:4px; }

.container { max-width:1280px; margin:0 auto; padding:16px 24px; }

.header { background:var(--header-bg); border-bottom:1px solid var(--border); padding:12px 0; margin-bottom:16px; position:sticky; top:0; z-index:100; transition:background .2s; }
.header .container { display:flex; align-items:center; gap:12px; padding-top:0; padding-bottom:0; }
.header svg.logo { fill:var(--text); }
.header-title { font-size:20px; font-weight:600; color:var(--text); }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.header-subtitle { font-size:13px; color:var(--text-secondary); }

/* Theme selector */
.theme-select { display:flex; align-items:center; gap:6px; }
.theme-select label { font-size:12px; color:var(--text-secondary); }
.theme-select select { background:var(--bg-tertiary); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; outline:none; }
.theme-select select:focus { border-color:var(--text-link); }

.breadcrumb { display:flex; align-items:center; gap:4px; padding:8px 16px; background:var(--bg); border:1px solid var(--border); border-radius:6px 6px 0 0; font-size:14px; flex-wrap:wrap; }
.breadcrumb a { color:var(--text-link); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.breadcrumb .sep { color:var(--text-secondary); margin:0 2px; }
.breadcrumb .current { color:var(--text); font-weight:600; }

.file-table { border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; overflow:hidden; }
.file-row { display:flex; align-items:center; padding:8px 16px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; gap:8px; }
.file-row:last-child { border-bottom:none; }
.file-row:hover { background:var(--hover); }
.file-row .icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.file-row .icon svg { fill:var(--icon-fill); }
.file-row .name { flex:1; font-size:14px; color:var(--text-link); }
.file-row .size { font-size:12px; color:var(--text-secondary); min-width:70px; text-align:right; }
.parent-row .name { color:var(--text-secondary); }

.code-header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:var(--bg-secondary); border:1px solid var(--border); border-top:none; }
.code-header .file-info { font-size:12px; color:var(--text-secondary); }
.code-wrapper { border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; overflow:auto; max-height:calc(100vh - 220px); background:var(--bg-secondary); }
.code-table { width:100%; border-collapse:collapse; font-size:13px; font-family:'SF Mono','Fira Code','Fira Mono',Menlo,Consolas,monospace; }
.code-table td { padding:0; vertical-align:top; white-space:pre; }
.code-table tr:hover { background:var(--line-hover); }
.line-num { width:1%; min-width:50px; padding:0 16px; text-align:right; color:var(--line-num); user-select:none; font-size:13px; line-height:20px; }
.line-num:hover { color:var(--text-link); }
.line-code { padding:0 16px; line-height:20px; }
.line-code code { background:transparent !important; padding:0 !important; }
pre code.hljs { background:transparent !important; padding:0 !important; }

.image-preview { border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; padding:32px; text-align:center; background:var(--bg-secondary); }
.image-preview img { max-width:100%; max-height:60vh; border:1px solid var(--border); border-radius:4px; }

.binary-msg, .empty { padding:48px; text-align:center; color:var(--text-secondary); background:var(--bg-secondary); font-size:14px; border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; }

.loading { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:var(--bg-secondary); border:1px solid var(--border); border-radius:8px; padding:24px 32px; font-size:14px; color:var(--text-secondary); z-index:200; }
.loading.show { display:block; }

.search-box { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.search-box input { flex:1; padding:6px 12px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; outline:none; }
.search-box input:focus { border-color:var(--text-link); box-shadow:0 0 0 3px rgba(88,166,255,0.15); }
.search-box input::placeholder { color:var(--text-secondary); }

.file-count { font-size:12px; color:var(--text-secondary); padding:4px 0; }

/* Markdown tabs */
.md-tabs { display:flex; border:1px solid var(--border); border-top:none; background:var(--bg-secondary); }
.md-tab { padding:8px 16px; font-size:13px; color:var(--text-secondary); cursor:pointer; border-bottom:2px solid transparent; transition:color .15s, border-color .15s; user-select:none; }
.md-tab:hover { color:var(--text); }
.md-tab.active { color:var(--text); border-bottom-color:var(--text-link); }
.md-tab svg { vertical-align:middle; margin-right:4px; }
.md-panel { display:none; }
.md-panel.active { display:block; }

/* Markdown preview */
.md-preview { border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; padding:24px 32px; background:var(--bg-secondary); overflow:auto; max-height:calc(100vh - 260px); font-size:15px; line-height:1.7; color:var(--text); }
.md-preview h1 { font-size:2em; font-weight:600; padding-bottom:.3em; border-bottom:1px solid var(--border); margin:24px 0 16px; }
.md-preview h1:first-child { margin-top:0; }
.md-preview h2 { font-size:1.5em; font-weight:600; padding-bottom:.3em; border-bottom:1px solid var(--border); margin:24px 0 16px; }
.md-preview h3 { font-size:1.25em; font-weight:600; margin:24px 0 16px; }
.md-preview h4 { font-size:1em; font-weight:600; margin:24px 0 16px; }
.md-preview p { margin:0 0 16px; }
.md-preview a { color:var(--text-link); text-decoration:none; }
.md-preview a:hover { text-decoration:underline; }
.md-preview code { background:var(--inline-code-bg); padding:0.2em 0.4em; border-radius:4px; font-size:85%; font-family:'SF Mono','Fira Code','Fira Mono',Menlo,Consolas,monospace; }
.md-preview pre { background:var(--code-bg); border:1px solid var(--border); border-radius:6px; padding:16px; overflow-x:auto; margin:0 0 16px; }
.md-preview pre code { background:transparent; padding:0; font-size:85%; }
.md-preview blockquote { border-left:4px solid var(--border); padding:0 16px; color:var(--text-secondary); margin:0 0 16px; }
.md-preview ul, .md-preview ol { padding-left:2em; margin:0 0 16px; }
.md-preview li { margin:4px 0; }
.md-preview li + li { margin-top:4px; }
.md-preview img { max-width:100%; border-radius:4px; }
.md-preview table { border-collapse:collapse; margin:0 0 16px; width:100%; }
.md-preview th, .md-preview td { border:1px solid var(--border); padding:8px 13px; }
.md-preview th { background:var(--bg-tertiary); font-weight:600; }
.md-preview tr:nth-child(even) { background:rgba(110,118,129,0.05); }
.md-preview hr { border:none; border-top:2px solid var(--border); margin:24px 0; }
.md-preview input[type="checkbox"] { margin-right:6px; }
.md-preview .mermaid-block { background:var(--code-bg); border:1px solid var(--border); border-radius:6px; padding:16px; margin:0 0 16px; text-align:center; color:var(--text-secondary); font-family:monospace; white-space:pre; }
.md-preview .mermaid-rendered { background:var(--code-bg); border:1px solid var(--border); border-radius:6px; padding:16px; margin:0 0 16px; text-align:center; overflow-x:auto; }
.md-preview .mermaid-rendered svg { max-width:100%; height:auto; }
.md-preview .mermaid-error { background:var(--code-bg); border:1px solid #f85149; border-radius:6px; margin:0 0 16px; }

/* === Server offline overlay === */
.offline-overlay { display:none; position:fixed; inset:0; z-index:9999; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:16px; }
.offline-overlay.show { display:flex; }
.offline-icon { opacity:.4; }
.offline-title { font-size:22px; font-weight:600; color:var(--text); }
.offline-subtitle { font-size:14px; color:var(--text-secondary); }
.offline-dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#f85149; margin-right:6px; animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <svg class="logo" height="28" viewBox="0 0 16 16" width="28"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path></svg>
    <span class="header-title" id="repoName">Code Browser</span>
    <div class="header-right">
      <div class="theme-select">
        <label for="themeSelector">Theme:</label>
        <select id="themeSelector" onchange="setTheme(this.value)">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="solarized">Solarized</option>
        </select>
      </div>
      <span class="header-subtitle" id="rootPath"></span>
    </div>
  </div>
</div>

<div class="container" id="app">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Filter files and folders..." autocomplete="off">
  </div>
  <div id="breadcrumb" class="breadcrumb"></div>
  <div id="content"></div>
</div>

<div class="loading" id="loading">Loading...</div>

<div class="offline-overlay" id="offlineOverlay">
  <svg class="offline-icon" height="64" viewBox="0 0 16 16" width="64" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8ZM5 12.25a.25.25 0 0 1 .25-.25h3.5a.25.25 0 0 1 .25.25v3.25a.25.25 0 0 1-.4.2l-1.45-1.087a.249.249 0 0 0-.3 0L5.4 15.7a.25.25 0 0 1-.4-.2Z"></path></svg>
  <div class="offline-title"><span class="offline-dot"></span>Server offline</div>
  <div class="offline-subtitle">The Code Browser server has stopped. Waiting for it to come back...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
/* ========== Theme management ========== */

var THEMES = {
  dark: {
    hljs: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css',
    mermaid: 'dark',
    mermaidVars: {
      darkMode: true,
      background: '#161b22',
      primaryColor: '#1f6feb',
      primaryTextColor: '#e6edf3',
      primaryBorderColor: '#30363d',
      lineColor: '#8b949e',
      secondaryColor: '#21262d',
      tertiaryColor: '#161b22',
      noteBkgColor: '#161b22',
      noteTextColor: '#e6edf3',
      noteBorderColor: '#30363d',
      actorTextColor: '#e6edf3',
      actorBkg: '#21262d',
      actorBorder: '#30363d',
      signalColor: '#e6edf3',
      signalTextColor: '#e6edf3'
    }
  },
  light: {
    hljs: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css',
    mermaid: 'default',
    mermaidVars: {
      darkMode: false,
      background: '#f6f8fa',
      primaryColor: '#dce6f0',
      primaryTextColor: '#1f2328',
      primaryBorderColor: '#d1d9e0',
      lineColor: '#656d76',
      secondaryColor: '#eef1f5',
      tertiaryColor: '#f6f8fa',
      noteBkgColor: '#f6f8fa',
      noteTextColor: '#1f2328',
      noteBorderColor: '#d1d9e0',
      actorTextColor: '#1f2328',
      actorBkg: '#eef1f5',
      actorBorder: '#d1d9e0',
      signalColor: '#1f2328',
      signalTextColor: '#1f2328'
    }
  },
  solarized: {
    hljs: 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/solarized-dark.min.css',
    mermaid: 'dark',
    mermaidVars: {
      darkMode: true,
      background: '#073642',
      primaryColor: '#1a6882',
      primaryTextColor: '#93a1a1',
      primaryBorderColor: '#2a5662',
      lineColor: '#657b83',
      secondaryColor: '#0a4050',
      tertiaryColor: '#073642',
      noteBkgColor: '#073642',
      noteTextColor: '#93a1a1',
      noteBorderColor: '#2a5662',
      actorTextColor: '#93a1a1',
      actorBkg: '#0a4050',
      actorBorder: '#2a5662',
      signalColor: '#93a1a1',
      signalTextColor: '#93a1a1'
    }
  }
};

function setTheme(name) {
  if (!THEMES[name]) name = 'dark';
  var theme = THEMES[name];

  // Set CSS vars
  document.documentElement.setAttribute('data-theme', name);

  // Swap highlight.js stylesheet
  document.getElementById('hljs-theme').setAttribute('href', theme.hljs);

  // Re-init mermaid with new theme and re-render existing diagrams
  mermaidInitialized = false;
  initMermaid(name);

  // Re-render mermaid blocks that are already rendered
  var rendered = document.querySelectorAll('.mermaid-rendered');
  rendered.forEach(function(el) {
    el.classList.remove('mermaid-rendered');
    el.classList.add('mermaid-block');
    // Restore original code from data attribute
    if (el.getAttribute('data-mermaid-src')) {
      el.textContent = el.getAttribute('data-mermaid-src');
    }
  });
  setTimeout(renderMermaidBlocks, 50);

  // Persist
  localStorage.setItem('code-browser-theme', name);

  // Sync selector
  document.getElementById('themeSelector').value = name;
}

function loadSavedTheme() {
  var saved = localStorage.getItem('code-browser-theme') || 'dark';
  setTheme(saved);
}

/* ========== App state ========== */

var state = { path: '', entries: [], fileContent: null, root: '' };

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function dirIcon() {
  return '<svg width="16" height="16" viewBox="0 0 16 16"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Z"></path></svg>';
}

function fileIcon() {
  return '<svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"></path></svg>';
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderBreadcrumb(path) {
  var parts = path ? path.split('/') : [];
  var html = '<a onclick="navigate(\'\')">root</a>';
  var accumulated = '';
  for (var i = 0; i < parts.length; i++) {
    accumulated += (accumulated ? '/' : '') + parts[i];
    html += '<span class="sep">/</span>';
    if (i === parts.length - 1 && state.fileContent !== null) {
      html += '<span class="current">' + escapeHtml(parts[i]) + '</span>';
    } else {
      html += '<a onclick="navigate(\'' + accumulated.replace(/'/g, "\\'") + '\')">' + escapeHtml(parts[i]) + '</a>';
    }
  }
  document.getElementById('breadcrumb').innerHTML = html;
}

function renderDir(entries, filter) {
  var filtered = filter
    ? entries.filter(function(e) { return e.name.toLowerCase().indexOf(filter.toLowerCase()) !== -1; })
    : entries;

  if (filtered.length === 0) {
    return '<div class="file-table"><div class="empty">' + (filter ? 'No matches found' : 'Empty directory') + '</div></div>';
  }

  var sorted = filtered.slice().sort(function(a, b) {
    if (a.is_dir && !b.is_dir) return -1;
    if (!a.is_dir && b.is_dir) return 1;
    return a.name.localeCompare(b.name);
  });

  var html = '<div class="file-count">' + sorted.length + ' item' + (sorted.length !== 1 ? 's' : '') + '</div>';
  html += '<div class="file-table">';

  if (state.path) {
    var parent = state.path.split('/').slice(0, -1).join('/');
    html += '<div class="file-row parent-row" onclick="navigate(\'' + parent.replace(/'/g, "\\'") + '\')">';
    html += '<span class="icon">' + dirIcon() + '</span>';
    html += '<span class="name">..</span>';
    html += '<span class="size"></span>';
    html += '</div>';
  }

  for (var i = 0; i < sorted.length; i++) {
    var entry = sorted[i];
    var entryPath = state.path ? state.path + '/' + entry.name : entry.name;
    html += '<div class="file-row" onclick="navigate(\'' + entryPath.replace(/'/g, "\\'") + '\')">';
    html += '<span class="icon">' + (entry.is_dir ? dirIcon() : fileIcon()) + '</span>';
    html += '<span class="name">' + escapeHtml(entry.name) + '</span>';
    html += '<span class="size">' + (entry.is_dir ? '' : formatSize(entry.size)) + '</span>';
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function isMarkdown(data) {
  return data.language === 'markdown';
}

function buildCodeView(data, wrapperId) {
  var lang = data.language || 'plaintext';
  var highlighted;
  try {
    highlighted = hljs.highlight(data.content, { language: lang, ignoreIllegals: true }).value;
  } catch(e) {
    highlighted = hljs.highlightAuto(data.content).value;
  }
  var hLines = highlighted.split('\n');

  var html = '<div id="' + wrapperId + '" class="code-wrapper"><table class="code-table"><tbody>';
  for (var i = 0; i < hLines.length; i++) {
    html += '<tr><td class="line-num">' + (i + 1) + '</td><td class="line-code"><code>' + (hLines[i] || ' ') + '</code></td></tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

/* ========== Mermaid ========== */

var mermaidInitialized = false;

function initMermaid(themeName) {
  themeName = themeName || (document.documentElement.getAttribute('data-theme') || 'dark');
  var cfg = THEMES[themeName] || THEMES.dark;
  mermaid.initialize({
    startOnLoad: false,
    theme: cfg.mermaid,
    themeVariables: cfg.mermaidVars
  });
  mermaidInitialized = true;
}

function renderMermaidBlocks() {
  if (!mermaidInitialized) initMermaid();
  var blocks = document.querySelectorAll('.mermaid-block');
  if (blocks.length === 0) return;

  blocks.forEach(function(block, idx) {
    var code = block.textContent;
    block.setAttribute('data-mermaid-src', code);
    var id = 'mermaid-graph-' + Date.now() + '-' + idx;
    mermaid.render(id, code).then(function(result) {
      block.innerHTML = result.svg;
      block.classList.remove('mermaid-block');
      block.classList.add('mermaid-rendered');
    }).catch(function(err) {
      block.innerHTML = '<pre style="color:#f85149;padding:12px;">Mermaid error: ' + escapeHtml(err.message || String(err)) + '</pre><pre style="color:var(--text-secondary);padding:0 12px 12px;">' + escapeHtml(code) + '</pre>';
      block.classList.add('mermaid-error');
    });
  });
}

/* ========== Markdown ========== */

function buildMarkdownPreview(data, wrapperId) {
  var mdRenderer = new marked.Renderer();

  mdRenderer.code = function(codeOrToken, infostring, escaped) {
    var lang, code;
    if (typeof codeOrToken === 'object') {
      lang = (codeOrToken.lang || '').trim().toLowerCase();
      code = codeOrToken.text || '';
    } else {
      lang = (infostring || '').trim().toLowerCase();
      code = codeOrToken || '';
    }
    if (lang === 'mermaid') {
      return '<div class="mermaid-block">' + escapeHtml(code) + '</div>';
    }
    var highlighted;
    if (lang && hljs.getLanguage(lang)) {
      try { highlighted = hljs.highlight(code, { language: lang }).value; } catch(e) { highlighted = escapeHtml(code); }
    } else {
      highlighted = escapeHtml(code);
    }
    return '<pre><code class="hljs language-' + escapeHtml(lang) + '">' + highlighted + '</code></pre>';
  };

  var rendered = marked.parse(data.content, { renderer: mdRenderer, breaks: false, gfm: true });
  return '<div id="' + wrapperId + '" class="md-preview">' + rendered + '</div>';
}

function switchMdTab(tab) {
  var tabs = document.querySelectorAll('.md-tab');
  var panels = document.querySelectorAll('.md-panel');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.remove('active');
    panels[i].classList.remove('active');
  }
  document.querySelector('.md-tab[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('md-panel-' + tab).classList.add('active');
  if (tab === 'preview') {
    setTimeout(renderMermaidBlocks, 0);
  }
}

/* ========== File rendering ========== */

function renderFile(data) {
  var html = '<div class="code-header"><span class="file-info">' + data.lines + ' lines | ' + formatSize(data.size) + ' | ' + (data.language || 'plaintext') + '</span></div>';

  if (data.is_image) {
    html += '<div class="image-preview"><img src="/api/raw?path=' + encodeURIComponent(state.path) + '"></div>';
    return html;
  }

  if (data.is_binary) {
    html += '<div class="binary-msg">Binary file not shown.</div>';
    return html;
  }

  if (isMarkdown(data)) {
    var codeIcon = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25ZM7.25 8h1.5v2.75a.25.25 0 0 0 .25.25h1a.25.25 0 0 0 .177-.427L8.384 8.776a.544.544 0 0 0-.768 0l-1.793 1.797A.25.25 0 0 0 6 11h1a.25.25 0 0 0 .25-.25Zm-1-2.5h5.5a.75.75 0 0 0 0-1.5h-5.5a.75.75 0 0 0 0 1.5Z"/></svg>';
    var previewIcon = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2c1.981 0 3.671.992 4.933 2.078 1.27 1.091 2.187 2.345 2.637 3.023a1.62 1.62 0 0 1 0 1.798c-.45.678-1.367 1.932-2.637 3.023C11.67 13.008 9.981 14 8 14c-1.981 0-3.671-.992-4.933-2.078C1.797 10.83.88 9.576.43 8.898a1.62 1.62 0 0 1 0-1.798c.45-.677 1.367-1.931 2.637-3.022C4.33 2.992 6.019 2 8 2ZM1.679 7.932a.12.12 0 0 0 0 .136c.411.622 1.241 1.75 2.366 2.717C5.176 11.758 6.527 12.5 8 12.5c1.473 0 2.825-.742 3.955-1.715 1.124-.967 1.954-2.096 2.366-2.717a.12.12 0 0 0 0-.136c-.412-.621-1.242-1.75-2.366-2.717C10.824 4.242 9.473 3.5 8 3.5c-1.473 0-2.824.742-3.955 1.715-1.124.967-1.954 2.096-2.366 2.717ZM8 10a2 2 0 1 1-.001-3.999A2 2 0 0 1 8 10Z"/></svg>';

    html += '<div class="md-tabs">';
    html += '<div class="md-tab active" data-tab="preview" onclick="switchMdTab(\'preview\')">' + previewIcon + ' Preview</div>';
    html += '<div class="md-tab" data-tab="code" onclick="switchMdTab(\'code\')">' + codeIcon + ' Code</div>';
    html += '</div>';
    html += '<div id="md-panel-preview" class="md-panel active">' + buildMarkdownPreview(data, 'md-preview-content') + '</div>';
    html += '<div id="md-panel-code" class="md-panel">' + buildCodeView(data, 'md-code-content') + '</div>';
    return html;
  }

  html += buildCodeView(data, 'code-content');
  return html;
}

/* ========== Navigation ========== */

function navigate(path) {
  document.getElementById('searchInput').value = '';
  document.getElementById('loading').classList.add('show');

  fetch('/api/browse?path=' + encodeURIComponent(path))
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      if (data.error) {
        if (path !== '') {
          window.location.href = '/';
        } else {
          renderBreadcrumb('');
          document.getElementById('content').innerHTML = '<div class="binary-msg">' + escapeHtml(data.error) + '</div>';
        }
        return;
      }

      state.path = path;
      document.getElementById('rootPath').textContent = path ? state.root + '/' + path : state.root;

      if (data.type === 'directory') {
        state.entries = data.entries;
        state.fileContent = null;
        renderBreadcrumb(path);
        document.getElementById('content').innerHTML = renderDir(data.entries, '');
      } else {
        state.fileContent = data;
        state.entries = [];
        renderBreadcrumb(path);
        document.getElementById('content').innerHTML = renderFile(data);
        if (isMarkdown(data)) {
          setTimeout(renderMermaidBlocks, 0);
        }
      }

      var url = path ? '?path=' + encodeURIComponent(path) : '/';
      history.pushState({ path: path }, '', url);
    })
    .catch(function(e) {
      document.getElementById('content').innerHTML = '<div class="binary-msg">Error: ' + escapeHtml(e.message) + '</div>';
    })
    .finally(function() {
      document.getElementById('loading').classList.remove('show');
    });
}

/* ========== Event listeners ========== */

document.getElementById('searchInput').addEventListener('input', function(e) {
  if (state.fileContent !== null) return;
  document.getElementById('content').innerHTML = renderDir(state.entries, e.target.value);
});

window.addEventListener('popstate', function(e) {
  var path = (e.state && e.state.path) || '';
  navigate(path);
});

document.addEventListener('keydown', function(e) {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
    document.getElementById('searchInput').value = '';
    if (state.fileContent === null) {
      document.getElementById('content').innerHTML = renderDir(state.entries, '');
    }
  }
});

/* ========== Live reload ========== */

var lastChangeId = -1;
var serverOnline = true;

function setServerOnline(online) {
  if (online === serverOnline) return;
  serverOnline = online;
  if (!online) {
    document.getElementById('offlineOverlay').classList.add('show');
  } else {
    // Server came back — refresh content first, then hide overlay to avoid flicker
    fetch('/api/info')
      .then(function(resp) { return resp.json(); })
      .then(function(info) {
        state.root = info.root;
        state.name = info.name;
        document.getElementById('repoName').textContent = info.name;
        document.getElementById('rootPath').textContent = state.path ? info.root + '/' + state.path : info.root;
        document.title = info.name + ' - Code Browser';
        navigate(state.path);
        document.getElementById('offlineOverlay').classList.remove('show');
      });
  }
}

function pollChanges() {
  fetch('/api/changes')
    .then(function(resp) { return resp.json(); })
    .then(function(data) {
      setServerOnline(true);
      var cid = data.change_id;
      if (lastChangeId === -1) {
        lastChangeId = cid;
      } else if (cid !== lastChangeId) {
        lastChangeId = cid;
        navigate(state.path);
      }
    })
    .catch(function() { setServerOnline(false); });
}

setInterval(pollChanges, 2000);

/* ========== Init ========== */

loadSavedTheme();

fetch('/api/info')
  .then(function(resp) { return resp.json(); })
  .then(function(info) {
    state.root = info.root;
    state.name = info.name;
    document.getElementById('repoName').textContent = info.name;
    document.getElementById('rootPath').textContent = info.root;
    document.title = info.name + ' - Code Browser';

    var params = new URLSearchParams(location.search);
    navigate(params.get('path') || '');
  });
</script>
